<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% block title %}
        新聞網站
      {% endblock %}
    </title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <!-- SweetAlert2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <style>
      body {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .navbar-brand {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
        font-weight: 700;
      }
      .card-title {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
        font-weight: 500;
      }
      .btn {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
        font-weight: 500;
      }
      .nav-link {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
        font-weight: 400;
      }
      .form-label {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
        font-weight: 500;
      }
      .text-muted {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
        font-weight: 400;
      }
      .swal2-popup {
        font-family: 'Noto Sans TC', 'Roboto', sans-serif;
      }
    </style>
  </head>
  <body>
    {% if user.is_authenticated %}
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
          <a class="navbar-brand" href="/">新聞網站</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link" href="/">首頁</a>
              </li>
              <!-- 這裡可以添加其他導航項目 -->
            </ul>
            <ul class="navbar-nav">
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">{{ user.username }}</a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                  <li>
                    <a class="dropdown-item" href="{% url 'profile' %}"><i class="bi bi-person"></i> 個人資料</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="{% url 'password_change' %}"><i class="bi bi-key"></i> 修改密碼</a>
                  </li>
                  <li>
                    <hr class="dropdown-divider" />
                  </li>
                  <li>
                    <form id="logoutForm" method="post" action="{% url 'logout' %}" class="d-inline">
                      {% csrf_token %}
                      <button type="button" class="dropdown-item text-danger" onclick="confirmLogout()"><i class="bi bi-box-arrow-right"></i> 登出</button>
                    </form>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    {% endif %}

    <div class="container">
      <main>
        {% block content %}

        {% endblock %}
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>

    <script>
    // 全域 SweetAlert2 設定
    const Toast = Swal.mixin({
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000,
      timerProgressBar: true
    });

    // 登出確認
    function confirmLogout() {
      Swal.fire({
        title: '確認登出',
        text: '您確定要登出嗎？',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '確認登出',
        cancelButtonText: '取消',
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33'
      }).then((result) => {
        if (result.isConfirmed) {
          document.getElementById('logoutForm').submit();
        }
      });
    }

    // 顯示成功訊息
    function showSuccess(message) {
      Toast.fire({
        icon: 'success',
        title: message
      });
    }

    // 顯示錯誤訊息
    function showError(message) {
      Toast.fire({
        icon: 'error',
        title: message
      });
    }

    // 顯示提示訊息
    function showInfo(message) {
      Toast.fire({
        icon: 'info',
        title: message
      });
    }

    {% if messages %}
      {% for message in messages %}
        {% if message.tags == 'success' %}
          showSuccess('{{ message }}');
        {% elif message.tags == 'error' %}
          showError('{{ message }}');
        {% else %}
          showInfo('{{ message }}');
        {% endif %}
      {% endfor %}
    {% endif %}
    </script>

    {% block extra_js %}

    {% endblock %}
  </body>
</html>
