{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
  登入
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">登入</h2>
          <form method="post" id="loginForm">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_username" class="form-label">使用者名稱</label>
              <input type="text" name="username" class="form-control" id="id_username" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
            </div>
            <div class="mb-3">
              <label for="id_password" class="form-label">密碼</label>
              <div class="input-group">
                <input type="password" name="password" class="form-control" id="id_password" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">登入</button>
            </div>
            <div class="mt-3 text-center">
              <a href="{% url 'password_reset' %}" class="text-decoration-none">忘記密碼？</a>
              <span class="mx-2">|</span>
              <a href="{% url 'signup' %}" class="text-decoration-none">註冊新帳號</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加 Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const togglePassword = document.querySelector('#togglePassword');
      const password = document.querySelector('#id_password');
      const form = document.getElementById('loginForm');
    
      togglePassword.addEventListener('click', function() {
        // 切換密碼可見性
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
    
        // 切換圖標
        this.querySelector('i').classList.toggle('bi-eye');
        this.querySelector('i').classList.toggle('bi-eye-slash');
      });

      // 表單驗證
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('id_username').value.trim();
        const password = document.getElementById('id_password').value;

        if (!username) {
          showError('請輸入使用者名稱');
          return;
        }

        if (!password) {
          showError('請輸入密碼');
          return;
        }

        // 如果驗證通過，顯示載入中提示並提交表單
        Swal.fire({
          title: '登入中...',
          text: '請稍候',
          icon: 'info',
          allowOutsideClick: false,
          showConfirmButton: false,
          willOpen: () => {
            Swal.showLoading();
            form.submit();
          }
        });
      });

      // 處理後端返回的錯誤訊息
      {% if form.errors %}
        {% if form.non_field_errors %}
          showError('使用者名稱或密碼錯誤');
        {% else %}
          {% for field, errors in form.errors.items %}
            {% for error in errors %}
              showError('{{ error|escapejs }}');
            {% endfor %}
          {% endfor %}
        {% endif %}
      {% endif %}
    });
  </script>
{% endblock %}
