{% extends 'base.html' %}
{% block title %}
  修改密碼
{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">修改密碼</h2>
          <p class="text-muted mb-4">為了安全起見，請輸入您的舊密碼，然後輸入兩次新密碼以確認。</p>
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_old_password" class="form-label">目前密碼</label>
              <div class="input-group">
                <input type="password" name="old_password" class="form-control" id="id_old_password" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="toggleOldPassword"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="mb-3">
              <label for="id_new_password1" class="form-label">新密碼</label>
              <div class="input-group">
                <input type="password" name="new_password1" class="form-control" id="id_new_password1" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword1"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="mb-3">
              <label for="id_new_password2" class="form-label">確認新密碼</label>
              <div class="input-group">
                <input type="password" name="new_password2" class="form-control" id="id_new_password2" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword2"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">修改密碼</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加 Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 密碼欄位可視化切換功能
      function setupPasswordToggle(toggleId, passwordId) {
        const toggleButton = document.querySelector('#' + toggleId)
        const passwordInput = document.querySelector('#' + passwordId)
    
        toggleButton.addEventListener('click', function () {
          // 切換密碼可見性
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password'
          passwordInput.setAttribute('type', type)
    
          // 切換圖標
          this.querySelector('i').classList.toggle('bi-eye')
          this.querySelector('i').classList.toggle('bi-eye-slash')
        })
      }
    
      // 設置所有密碼欄位的可視化切換
      setupPasswordToggle('toggleOldPassword', 'id_old_password')
      setupPasswordToggle('toggleNewPassword1', 'id_new_password1')
      setupPasswordToggle('toggleNewPassword2', 'id_new_password2')
    })
  </script>
{% endblock %}
