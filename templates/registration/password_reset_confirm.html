{% extends 'base.html' %}
{% block title %}
  設定新密碼
{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">設定新密碼</h2>
          <form method="POST" id="resetForm">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_new_password1" class="form-label">新密碼</label>
              <div class="input-group">
                <input type="password" name="new_password1" class="form-control" id="id_new_password1" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword1"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="mb-3">
              <label for="id_new_password2" class="form-label">確認新密碼</label>
              <div class="input-group">
                <input type="password" name="new_password2" class="form-control" id="id_new_password2" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword2"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">修改密碼</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加 Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 密碼欄位可視化切換功能
      function setupPasswordToggle(toggleId, passwordId) {
        const toggleButton = document.querySelector('#' + toggleId)
        const passwordInput = document.querySelector('#' + passwordId)
    
        toggleButton.addEventListener('click', function () {
          // 切換密碼可見性
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password'
          passwordInput.setAttribute('type', type)
    
          // 切換圖標
          this.querySelector('i').classList.toggle('bi-eye')
          this.querySelector('i').classList.toggle('bi-eye-slash')
        })
      }
    
      // 設置兩個密碼欄位的可視化切換
      setupPasswordToggle('togglePassword1', 'id_new_password1')
      setupPasswordToggle('togglePassword2', 'id_new_password2')
    
      // 表單提交處理
      const form = document.getElementById('resetForm')
      form.addEventListener('submit', function (e) {
        e.preventDefault()
        const password1 = document.getElementById('id_new_password1').value
        const password2 = document.getElementById('id_new_password2').value
    
        if (password1 !== password2) {
          showError('兩次輸入的密碼不相符')
          return
        }
    
        if (password1.length < 8) {
          showError('密碼長度必須至少為8個字符')
          return
        }
    
        // 如果驗證通過，提交表單
        form.submit()
      })
    })
  </script>
{% endblock %}
