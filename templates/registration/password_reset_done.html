{% extends 'base.html' %}
{% block title %}
  密碼重置郵件已發送
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body text-center">
          <h2 class="card-title mb-4">密碼重置郵件已發送</h2>
          <p>請檢查您的電子郵件信箱，我們已發送密碼重置說明至您的信箱。</p>
          <p>如果您沒有收到郵件，請確認您輸入的電子郵件地址是否正確，並檢查您的垃圾郵件資料夾。</p>
          <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-primary">返回登入</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      showSuccess('密碼重置郵件已發送至您的信箱，請查收並按照郵件中的說明進行操作。')
    })
  </script>
{% endblock %}
