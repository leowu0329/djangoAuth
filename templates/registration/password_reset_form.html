{% extends 'base.html' %}

{% block title %}
  重置密碼
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">重置密碼</h2>
          <p class="text-muted text-center mb-4">請輸入您註冊時使用的電子郵件地址，我們將發送密碼重置說明給您。</p>
          <form method="POST" id="resetForm">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_email" class="form-label">電子郵件</label>
              <input type="email" name="email" class="form-control" id="id_email" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">發送重置郵件</button>
              <a href="{% url 'login' %}" class="btn btn-outline-secondary">返回登入</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('resetForm')
      form.addEventListener('submit', function (e) {
        e.preventDefault()
        const email = document.getElementById('id_email').value
    
        if (!email) {
          showError('請輸入電子郵件地址')
          return
        }
    
        // 簡單的電子郵件格式驗證
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
        if (!emailRegex.test(email)) {
          showError('請輸入有效的電子郵件地址')
          return
        }
    
        // 如果驗證通過，顯示載入中提示並提交表單
        Swal.fire({
          title: '處理中...',
          text: '正在發送重置郵件',
          icon: 'info',
          allowOutsideClick: false,
          showConfirmButton: false,
          willOpen: () => {
            Swal.showLoading()
            form.submit()
          }
        })
      })
    })
  </script>
{% endblock %}
