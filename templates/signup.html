{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
  註冊
{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">註冊帳號</h2>
          <form method="post" id="signupForm">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_username" class="form-label">使用者名稱</label>
              <input type="text" name="username" class="form-control" id="id_username" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
              <div class="form-text">使用者名稱只能包含字母、數字和 @/./+/-/_ 字符。</div>
            </div>
            <div class="mb-3">
              <label for="id_password1" class="form-label">密碼</label>
              <div class="input-group">
                <input type="password" name="password1" class="form-control" id="id_password1" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword1"><i class="bi bi-eye"></i></button>
              </div>
              <div id="passwordHelpBlock" class="form-text">
                密碼必須：<ul class="mb-0">
                  <li>至少包含 8 個字符</li>
                  <li>不能與使用者名稱太相似</li>
                  <li>不能是常見密碼</li>
                  <li>必須包含字母和數字</li>
                </ul>
              </div>
            </div>
            <div class="mb-3">
              <label for="id_password2" class="form-label">確認密碼</label>
              <div class="input-group">
                <input type="password" name="password2" class="form-control" id="id_password2" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword2"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="mb-3">
              <label for="id_email" class="form-label">電子郵件</label>
              <input type="email" name="email" class="form-control" id="id_email" required oninput="this.style.backgroundColor = this.value ? 'LemonChiffon' : ''" />
            </div>
            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary">註冊</button>
              <a href="{% url 'login' %}" class="btn btn-outline-secondary">已有帳號？立即登入</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加 Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 密碼欄位可視化切換功能
      function setupPasswordToggle(toggleId, passwordId) {
        const toggleButton = document.querySelector('#' + toggleId);
        const passwordInput = document.querySelector('#' + passwordId);
    
        toggleButton.addEventListener('click', function() {
          // 切換密碼可見性
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
    
          // 切換圖標
          this.querySelector('i').classList.toggle('bi-eye');
          this.querySelector('i').classList.toggle('bi-eye-slash');
        });
      }
    
      // 設置兩個密碼欄位的可視化切換
      setupPasswordToggle('togglePassword1', 'id_password1');
      setupPasswordToggle('togglePassword2', 'id_password2');

      // 表單驗證
      const form = document.getElementById('signupForm');
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('id_username').value.trim();
        const password1 = document.getElementById('id_password1').value;
        const password2 = document.getElementById('id_password2').value;
        const email = document.getElementById('id_email').value.trim();

        // 使用者名稱驗證
        if (!username) {
          showError('請輸入使用者名稱');
          return;
        }
        
        const usernameRegex = /^[\w.@+-]+$/;
        if (!usernameRegex.test(username)) {
          showError('使用者名稱只能包含字母、數字和 @/./+/-/_ 字符');
          return;
        }

        // 密碼驗證
        if (!password1) {
          showError('請輸入密碼');
          return;
        }

        if (password1.length < 8) {
          showError('密碼長度必須至少為8個字符');
          return;
        }

        if (!/[A-Za-z]/.test(password1) || !/[0-9]/.test(password1)) {
          showError('密碼必須包含字母和數字');
          return;
        }

        if (password1 !== password2) {
          showError('兩次輸入的密碼不相符');
          return;
        }

        // 電子郵件驗證
        if (!email) {
          showError('請輸入電子郵件地址');
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          showError('請輸入有效的電子郵件地址');
          return;
        }

        // 如果驗證通過，顯示載入中提示並提交表單
        Swal.fire({
          title: '註冊中...',
          text: '請稍候',
          icon: 'info',
          allowOutsideClick: false,
          showConfirmButton: false,
          willOpen: () => {
            Swal.showLoading();
            form.submit();
          }
        });
      });

      // 處理後端返回的錯誤訊息
      {% if form.errors %}
        {% for field, errors in form.errors.items %}
          {% for error in errors %}
            showError('{{ error|escapejs }}');
          {% endfor %}
        {% endfor %}
      {% endif %}
    });
  </script>
{% endblock %}
